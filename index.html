<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Redirecting…</title>
<link rel="canonical" href="https://jeffliulab.github.io/ai-industry-research/">
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="0; url=https://jeffliulab.github.io/ai-industry-research/">
<script>
  (function () {
    var oldBase = "/industry-research";
    var newBase = "/ai-industry-research";
    var path = window.location.pathname;
    var rest = path.indexOf(oldBase) === 0 ? path.slice(oldBase.length) : "";
    var target = "https://jeffliulab.github.io" + newBase + rest + window.location.search + window.location.hash;
    window.location.replace(target);
  })();
</script>
</head>
<body>
<p>This page has moved to <a href="https://jeffliulab.github.io/ai-industry-research/">jeffliulab.github.io/ai-industry-research</a>.</p>
</body>
</html>
