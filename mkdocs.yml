site_name: 行业研究 | Industry Research
site_author: 刘杰夫
site_url: https://jeffliulab.github.io/industry-research/
site_description: AI、机器人、具身智能、AI 金融、AI 互联网的行业/公司/产品调研笔记

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
plugins:
  - search

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - meta
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - mdx_truly_sane_lists:
      nested_indent: 2

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - site_extra_styles/javascripts/mermaid.js
  - site_extra_styles/javascripts/katex.js
  - site_extra_styles/javascripts/tab_dropdown.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

extra_css:
  - https://unpkg.com/katex@0/dist/katex.min.css
  - site_extra_styles/stylesheets/extra.css
  - site_extra_styles/stylesheets/correct_bullet_point.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jeffliulab
  generator: false

copyright: >
  © 2026 刘杰夫 · 内容为个人整理的公开信息汇编，不构成投资建议

